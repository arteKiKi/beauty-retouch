<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before After Gallery</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: #fff;
}

/* 中央寄せグリッド */
.gallery-wrapper {
  display: flex;
  justify-content: center;
}
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 20px;
  max-width: 900px;
  width: 100%;
}
.gallery img {
  width: 100%;
  cursor: pointer;
  border-radius: 8px;
}

/* モーダル */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
}
.modal.active {
  display: flex;
}

/* UI */
.close {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 28px;
  cursor: pointer;
}
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 36px;
  cursor: pointer;
  user-select: none;
}
.prev { left: 15px; }
.next { right: 15px; }

/* スライダー */
.slider-container {
  position: relative;
  width: 95%;
  max-width: 900px;
  aspect-ratio: 3/2;
  overflow: hidden;
}
.slider-container img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.after {
  clip-path: inset(0 50% 0 0);
}

/* スライダーUI */
.range {
  position: absolute;
  bottom: 10px;
  width: 100%;
}

/* スマホ調整 */
@media (max-width: 600px) {
  .nav {
    font-size: 28px;
  }
}
</style>
</head>

<body>

<div class="gallery-wrapper">
  <div class="gallery" id="gallery"></div>
</div>

<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">×</div>
  <div class="nav prev" onclick="prev()">←</div>
  <div class="nav next" onclick="next()">→</div>

  <div class="slider-container" id="sliderContainer">
    <img id="beforeImg">
    <img id="afterImg" class="after">
    <input type="range" min="0" max="100" value="50" class="range" id="slider">
  </div>
</div>

<script>
const data = [
  {
    before: "https://picsum.photos/id/1011/1200/800",
    after:  "https://picsum.photos/id/1012/1200/800",
    thumb:  "https://picsum.photos/id/1011/400/300"
  },
  {
    before: "https://picsum.photos/id/1025/1200/800",
    after:  "https://picsum.photos/id/1020/1200/800",
    thumb:  "https://picsum.photos/id/1025/400/300"
  },
  {
    before: "https://picsum.photos/id/1035/1200/800",
    after:  "https://picsum.photos/id/1039/1200/800",
    thumb:  "https://picsum.photos/id/1035/400/300"
  }
];

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const beforeImg = document.getElementById("beforeImg");
const afterImg = document.getElementById("afterImg");
const slider = document.getElementById("slider");
const container = document.getElementById("sliderContainer");

let current = 0;

/* ギャラリー生成 */
data.forEach((item, index) => {
  const img = document.createElement("img");
  img.src = item.thumb;
  img.onclick = () => openModal(index);
  gallery.appendChild(img);
});

/* 画像プリロード */
function preloadImages() {
  data.forEach(item => {
    const img1 = new Image();
    const img2 = new Image();
    img1.src = item.before;
    img2.src = item.after;
  });
}
preloadImages();

function openModal(index){
  current = index;
  update();
  modal.classList.add("active");
}

function closeModal(){
  modal.classList.remove("active");
}

function next(){
  current = (current + 1) % data.length;
  update();
}

function prev(){
  current = (current - 1 + data.length) % data.length;
  update();
}

function update(){
  beforeImg.src = data[current].before;
  afterImg.src = data[current].after;
  slider.value = 50;
  updateSlider();
}

function updateSlider(){
  const value = slider.value;
  afterImg.style.clipPath = `inset(0 ${100 - value}% 0 0)`;
}

slider.addEventListener("input", updateSlider);

/* スワイプ対応 */
let startX = 0;

container.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

container.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if (diff > 50) next();
  if (diff < -50) prev();
});
</script>

</body>
</html>
