<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before After Gallery</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: #fff;
}

/* ギャラリー中央 */
.gallery-wrapper {
  display: flex;
  justify-content: center;
}
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 20px;
  max-width: 900px;
  width: 100%;
}
.gallery img {
  width: 100%;
  cursor: pointer;
  border-radius: 8px;
}

/* モーダル */
.modal {
  position: fixed;
  inset: 0;
  background: #000;
  display: none;
  justify-content: center;
  align-items: center;
}
.modal.active {
  display: flex;
}

/* ぼかし背景 */
.blur-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: blur(40px) brightness(0.5);
  transform: scale(1.1);
}

/* UI */
.close {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 28px;
  cursor: pointer;
  z-index: 10;
}
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 36px;
  cursor: pointer;
  user-select: none;
  z-index: 10;
}
.prev { left: 15px; }
.next { right: 15px; }

/* スライダー */
.slider-container {
  position: relative;
  width: 95%;
  max-width: 900px;
  height: 90vh;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 5;
}

/* 画像 */
.slider-container img {
  position: absolute;
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.after {
  clip-path: inset(0 50% 0 0);
}

/* スライダー */
.range {
  position: absolute;
  bottom: 10px;
  width: 90%;
  z-index: 10;
}

/* スマホ */
@media (max-width: 600px) {
  .nav {
    font-size: 28px;
  }
}
</style>
</head>

<body>

<div class="gallery-wrapper">
  <div class="gallery" id="gallery"></div>
</div>

<div class="modal" id="modal">
  <div class="blur-bg" id="blurBg"></div>

  <div class="close" onclick="closeModal()">×</div>
  <div class="nav prev" onclick="prev()">←</div>
  <div class="nav next" onclick="next()">→</div>

  <div class="slider-container" id="sliderContainer">
    <img id="beforeImg">
    <img id="afterImg" class="after">
    <input type="range" min="0" max="100" value="50" class="range" id="slider">
  </div>
</div>

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const beforeImg = document.getElementById("beforeImg");
const afterImg = document.getElementById("afterImg");
const slider = document.getElementById("slider");
const container = document.getElementById("sliderContainer");
const blurBg = document.getElementById("blurBg");

let current = 0;

/* ギャラリー */
data.forEach((item, index) => {
  const img = document.createElement("img");
  img.src = item.thumb;
  img.onclick = () => openModal(index);
  gallery.appendChild(img);
});

/* プリロード */
data.forEach(item => {
  new Image().src = item.before;
  new Image().src = item.after;
});

function openModal(index){
  current = index;
  update();
  modal.classList.add("active");
}

function closeModal(){
  modal.classList.remove("active");
}

function next(){
  current = (current + 1) % data.length;
  update();
}

function prev(){
  current = (current - 1 + data.length) % data.length;
  update();
}

function update(){
  const imgSrc = data[current].before;

  /* 背景更新 */
  blurBg.style.backgroundImage = `url(${imgSrc})`;

  beforeImg.onload = () => {
    const ratio = beforeImg.naturalWidth / beforeImg.naturalHeight;
    container.style.height = ratio < 1 ? "90vh" : "75vh";
  };

  beforeImg.src = data[current].before;
  afterImg.src = data[current].after;

  slider.value = 50;
  updateSlider();
}

function updateSlider(){
  const value = slider.value;
  afterImg.style.clipPath = `inset(0 ${100 - value}% 0 0)`;
}

slider.addEventListener("input", updateSlider);

/* スワイプ */
let startX = 0;

container.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

container.addEventListener("touchend", e => {
  let diff = startX - e.changedTouches[0].clientX;
  if (diff > 50) next();
  if (diff < -50) prev();
});
</script>

</body>
</html>
